name: Release

on:
  workflow_dispatch:
    inputs:
      docker:
        description: "Docker Images"
        required: false
        type: boolean
        default: true
      githubRelease:
        description: "GitHub Release"
        required: false
        type: boolean
        default: true

jobs:
  docker:
    if: inputs.docker
    runs-on: ubuntu-latest
    environment: docker-registry
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set Docker Tags
        id: docker_tags
        run: |
          LAST_COMMIT_HASH=$(git rev-parse --short HEAD)

          echo "LAST_COMMIT_HASH=$LAST_COMMIT_HASH" >> $GITHUB_ENV
          echo "LAST_COMMIT_HASH=${LAST_COMMIT_HASH}"

          VERSION=$(node -p -e "require('./spaceship-app/package.json').version")

          SPACESHIP_TAGS=""
          if [[ $VERSION =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            SPACESHIP_TAGS="${{ vars.DOCKER_REGISTRY }}/${{ github.repository }}-spaceship-app:latest"
          fi
          SPACESHIP_TAGS="$SPACESHIP_TAGS,${{ vars.DOCKER_REGISTRY }}/${{ github.repository }}-spaceship-app:$VERSION"

          SUPER_AGENT_TAGS=""
          if [[ $VERSION =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            SUPER_AGENT_TAGS="${{ vars.DOCKER_REGISTRY }}/${{ github.repository }}-super-agent:latest"
          fi
          SUPER_AGENT_TAGS="$SUPER_AGENT_TAGS,${{ vars.DOCKER_REGISTRY }}/${{ github.repository }}-super-agent:$VERSION"

          echo "spaceship_tags=$SPACESHIP_TAGS" >> $GITHUB_OUTPUT
          echo "super_agent_tags=$SUPER_AGENT_TAGS" >> $GITHUB_OUTPUT
          echo "Spaceship: $SPACESHIP_TAGS"
          echo "Super Agent: $SUPER_AGENT_TAGS"

      - name: Build and Push spaceship-app
        uses: docker/build-push-action@v6
        with:
          context: .
          file: spaceship-app/Dockerfile
          tags: ${{ steps.docker_tags.outputs.spaceship_tags }}
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            GIT_COMMIT_HASH=${{ env.LAST_COMMIT_HASH }}

      - name: Build and Push super-agent
        uses: docker/build-push-action@v6
        with:
          context: .
          file: super-agent/Dockerfile
          tags: ${{ steps.docker_tags.outputs.super_agent_tags }}
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            GIT_COMMIT_HASH=${{ env.LAST_COMMIT_HASH }}

  githubRelease:
    needs: [docker]
    if: |
      always() &&
      !contains(needs.*.result, 'cancelled') &&
      !contains(needs.*.result, 'failure') &&
      inputs.githubRelease
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: open-resource-discovery/github-release@main
