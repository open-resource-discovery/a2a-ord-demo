services:
  spaceship-app:
    build:
      context: ..
      dockerfile: spaceship-app/Dockerfile
    ports:
      - "3001:3000"
    environment:
      - PORT=3000
      - SERVER_URL=http://localhost:3001
    networks:
      default:
        aliases:
          - spaceship.local
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 5s
      retries: 5

  super-agent:
    build:
      context: ..
      dockerfile: super-agent/Dockerfile
    ports:
      - "3002:3000"
    environment:
      - PORT=3000
      - SERVER_URL=http://localhost:3002
      - ORD_SOURCE_URL=http://localhost:3001
    networks:
      default:
        aliases:
          - super-agent.local
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 5s
      retries: 5
    depends_on:
      spaceship-app:
        condition: service_healthy

  ord-provider-super:
    image: ghcr.io/open-resource-discovery/provider-server:latest
    user: "1000:1000"
    ports:
      - "3004:8080"
    volumes:
      - ../super-agent/ord-data:/app/data
    command: ["-d", "/app/data", "--base-url", "http://super-agent.local:3000"]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/.well-known/open-resource-discovery').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 5s
      retries: 5
    depends_on:
      super-agent:
        condition: service_healthy
